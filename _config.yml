title: TuneUp.ai
email: yanli@tuneup.ai
description: >-
  AI-based, fully automatic parameter tuning solutions for servers, data
  centers, mobile devices, IoT, and supercomputers.

# minima is the default GitHub Pages theme — no plugins needed.
theme: minima

# Pages shown in the top navigation (in order).
header_pages:
  - pilot.md

# --- Where the site is served -------------------------------------------------
# CURRENT: project subpath at https://mlogic.github.io/tuneup-site/
baseurl: "/tuneup-site"
url: "https://mlogic.github.io"
#
# CUTOVER to the tuneup.ai custom domain (after DNS is pointed at GitHub Pages):
# change the two lines above to:
#   baseurl: ""
#   url: "https://tuneup.ai"
# All page links use `relative_url`, so this is the only change needed.
# ------------------------------------------------------------------------------

show_excerpts: false

# Build settings
markdown: kramdown

exclude:
  - README.md
  - Gemfile
  - Gemfile.lock
